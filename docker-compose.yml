version: '3.8'

services:
  # 1. Front-end Nginx Client Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexushub-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - nexushub-network
    restart: always

  # 2. Back-end Node.js API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexushub-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27107/nexushub
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=super_secret_auth_token_key_nexus
      - OPENAI_API_KEY=mock-key-if-local-testing
      - PINECONE_API_KEY=mock-key-if-local-testing
    depends_on:
      - mongodb
      - redis
    networks:
      - nexushub-network
    restart: always

  # 3. Mongoose MongoDB Database Engine
  mongodb:
    image: mongo:6.0
    container_name: nexushub-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - nexushub-network
    restart: always

  # 4. Redis Cache / Session PubSub Broker
  redis:
    image: redis:7.0-alpine
    container_name: nexushub-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - nexushub-network
    restart: always

volumes:
  mongo-data:
  redis-data:

networks:
  nexushub-network:
    driver: bridge
